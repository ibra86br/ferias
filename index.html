<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mais um dia sem você</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Quicksand', sans-serif;
      background: url('background.png') no-repeat center center fixed;
      background-size: cover;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: white;
      opacity: 0.2;
      z-index: -1;
    }

    .container {
      background: rgba(255, 255, 255, 0.7);
      margin: 5% auto;
      padding: 40px;
      width: 70%;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255, 192, 203, 0.8);
      text-align: center;
      color: #8B0000;
      display: none;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 30px;
      font-weight: 600;
    }

    .dia {
      font-size: 22px;
      margin-bottom: 20px;
      text-align: left;
    }

    .fecha {
      font-weight: bold;
      color: #D6336C;
    }

    .mensaje {
      margin-left: 20px;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.8);
      padding: 30px;
      border-radius: 15px;
      width: 300px;
      margin: 15% auto;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    .login-box input[type="password"] {
      padding: 10px;
      width: 80%;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .login-box button {
      padding: 10px 20px;
      border: none;
      background-color: #D6336C;
      color: white;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .login-box button:hover {
      background-color: #c12259;
    }

    .error {
      color: red;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="login-box" id="loginBox">
    <h2>Digite a senha</h2>
    <input type="password" id="senha" placeholder="Senha">
    <br>
    <button onclick="verificarSenha()">Entrar</button>
    <p class="error" id="erroMsg" style="display:none;">Senha incorreta!</p>
  </div>

  <div class="container" id="conteudo">
    <h1>Mais um dia sem você</h1>

    <div class="dia">
      <span class="fecha">Día 1:</span>
      <span class="mensaje">Começei fazer o site para suas ferias kkkkkkkkk.</span>
    </div>

    <!--
    <div class="dia">
      <span class="fecha">Día 2:</span>
      <span class="mensaje">Un mensaje tuyo cambió por completo mi estado de ánimo.</span>
    </div>
    -->
  </div>

  <script>
    function verificarSenha() {
      const senha = document.getElementById("senha").value;
      const correto = "8169";
      if (senha === correto) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("conteudo").style.display = "block";
      } else {
        document.getElementById("erroMsg").style.display = "block";
      }
    }
  </script>
</body>
</html>
