<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mais um dia sem você</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a2d0b5d6d3.js" crossorigin="anonymous"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Quicksand', sans-serif;
    }

    body.fundoAtivo {
      background: url('background.png') no-repeat center center fixed;
      background-size: cover;
    }

    body.fundoAtivo::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: white;
      opacity: 0.2;
      z-index: -1;
    }

    .container {
      background: rgba(255, 255, 255, 0.65);
      margin: 5% auto;
      padding: 30px;
      width: 90%;
      max-width: 600px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255, 192, 203, 0.8);
      text-align: center;
      color: #8B0000;
      display: none;
      animation: fadeIn 1.2s ease;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 25px;
      font-weight: 600;
    }

    .dia {
      font-size: 18px;
      margin-bottom: 18px;
      text-align: left;
    }

    .fecha {
      font-weight: bold;
      color: #D6336C;
    }

    .mensaje {
      margin-left: 10px;
    }

    .login-box {
      background-image: url('background_login.png');
      background-size: cover;
      background-position: center;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .login-overlay {
      background-color: rgba(0, 0, 0, 0.6);
      padding: 30px 20px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 320px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    .login-overlay i {
      font-size: 36px;
      margin-bottom: 10px;
      color: #fff;
    }

    .login-overlay h2 {
      margin-bottom: 20px;
      color: #fff;
      font-size: 20px;
    }

    .login-overlay input[type="password"] {
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .login-overlay button {
      padding: 10px 20px;
      border: none;
      background-color: #D6336C;
      color: white;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
    }

    .login-overlay button:hover {
      background-color: #c12259;
    }

    .error {
      color: red;
      font-size: 14px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .chat-box {
      background: #fff;
      border-radius: 10px;
      padding: 15px;
      margin-top: 30px;
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #ccc;
      text-align: left;
    }

    .chat-message {
      margin-bottom: 10px;
    }

    .chat-message strong {
      color: #D6336C;
    }

    .chat-input {
      display: flex;
      margin-top: 10px;
    }

    .chat-input input {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .chat-input button {
      margin-left: 10px;
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      background-color: #D6336C;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="login-box" id="loginBox">
    <div class="login-overlay">
      <i class="fas fa-lock"></i>
      <h2>Confirmemos quem é você</h2>
      <input type="password" id="senha" placeholder="Senha" onkeypress="if(event.key === 'Enter') verificarSenha()">
      <button onclick="verificarSenha()">Entrar</button>
      <p class="error" id="erroMsg" style="display:none;">Senha incorreta!</p>
    </div>
  </div>

  <div class="container" id="conteudo">
    <h1>Mais um dia sem você</h1>

    <div class="dia">
      <span class="fecha">Día 1:</span>
      <span class="mensaje">Começei fazer o site para suas ferias kkkkkkkkk.</span>
    </div>

    <div class="chat-box" id="chatBox">
      <!-- mensagens aparecem aqui -->
    </div>

    <div class="chat-input">
      <input type="text" id="mensagemInput" placeholder="Escreva uma mensagem..." onkeypress="if(event.key === 'Enter') enviarMensagem()">
      <button onclick="enviarMensagem()">Enviar</button>
    </div>
  </div>

  <script>
    let usuario = null;

    function verificarSenha() {
      const senha = document.getElementById("senha").value;
      if (senha === "14141516") {
        usuario = "Você";
      } else if (senha === "170125") {
        usuario = "Kamille";
      } else {
        document.getElementById("erroMsg").style.display = "block";
        return;
      }

      document.getElementById("loginBox").style.display = "none";
      document.getElementById("conteudo").style.display = "block";
      document.body.classList.add("fundoAtivo");

      carregarMensagens();
    }

    function enviarMensagem() {
      const input = document.getElementById("mensagemInput");
      const texto = input.value.trim();
      if (texto === "") return;

      const novaMensagem = {
        autor: usuario,
        texto: texto,
        data: new Date().toISOString()
      };

      const mensagens = JSON.parse(localStorage.getItem("chat") || "[]");
      mensagens.push(novaMensagem);
      localStorage.setItem("chat", JSON.stringify(mensagens));

      adicionarMensagemNaTela(novaMensagem);
      input.value = "";
    }

    function carregarMensagens() {
      const mensagens = JSON.parse(localStorage.getItem("chat") || "[]");
      mensagens.forEach(adicionarMensagemNaTela);
    }

    function adicionarMensagemNaTela(mensagem) {
      const chatBox = document.getElementById("chatBox");
      const msgDiv = document.createElement("div");
      msgDiv.className = "chat-message";
      msgDiv.innerHTML = `<strong>${mensagem.autor}:</strong> ${mensagem.texto}`;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>

</body>
</html>
